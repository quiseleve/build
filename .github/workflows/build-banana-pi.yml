name: Build Banana Pi M1 Image

on:
  workflow_dispatch:
    inputs:
      release_suite:
        description: 'Choose OS Release'
        required: true
        default: 'sid'
        type: choice
        options:
          - sid
          - bookworm

jobs:
  compile-image:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Armbian
        uses: armbian/build@main
        with:
          armbian_token: "${{ secrets.GITHUB_TOKEN }}"
          armbian_board: "bananapi"
          armbian_kernel_branch: "edge"
          armbian_release: "${{ github.event.inputs.release_suite }}"
          armbian_ui: "minimal"
          armbian_target: "build"

      - name: Fix Permissions
        # This gives the runner ownership back so it can read the folders
        run: sudo chown -R $USER:$USER .

      - name: Upload Image Artifact
        uses: actions/upload-artifact@v4
        with:
          name: armbian-banana-pi-${{ github.event.inputs.release_suite }}
          path: build/output/images/*.img.xz
          if-no-files-found: warn
